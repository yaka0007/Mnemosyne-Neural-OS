# Updates <!--PROFILE_STATS_START--> … <!--PROFILE_STATS_END--> in this repo’s README (same logic as profile repo).
# Requires repository secret PROFILE_STATS_PAT (classic PAT, scope read:user).
# Add the same secret as on yaka0007/yaka0007: Settings → Secrets → Actions.

name: Update README maintainer stats

on:
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neural-os-maintainer-stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require PROFILE_STATS_PAT secret
        env:
          PROFILE_STATS_PAT: ${{ secrets.PROFILE_STATS_PAT }}
        run: |
          if [ -z "$PROFILE_STATS_PAT" ]; then
            echo "::error::Add classic PAT with scope read:user as PROFILE_STATS_PAT (same as profile repo)."
            exit 1
          fi

      - name: Verify PAT scopes (header only)
        env:
          PROFILE_STATS_PAT: ${{ secrets.PROFILE_STATS_PAT }}
        run: |
          curl -sS -I -H "Authorization: Bearer ${PROFILE_STATS_PAT}" https://api.github.com/user \
            | tr -d '\r' | grep -i '^x-oauth-scopes:' || true

      - name: Fetch GitHub stats & rewrite README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROFILE_STATS_PAT }}
          script: |
            const fs = require('fs');
            const path = 'README.md';
            const now = new Date();
            const year = now.getUTCFullYear();
            const from = new Date(Date.UTC(year, 0, 1, 0, 0, 0)).toISOString();
            const to = now.toISOString();
            const login = context.repo.owner;
            const toDay = now.toISOString().slice(0, 10);

            async function contributionsFromPublicPage() {
              const url =
                'https://github.com/users/' +
                encodeURIComponent(login) +
                '/contributions?from=' +
                year +
                '-01-01&to=' +
                toDay;
              const res = await fetch(url, {
                headers: {
                  'User-Agent': 'Mnemosyne-Neural-OS-readme-stats',
                  Accept: 'text/html',
                },
              });
              if (!res.ok) throw new Error('contributions page HTTP ' + res.status);
              const html = await res.text();
              let sum = 0;
              const re = /data-count="(\d+)"/g;
              let m;
              while ((m = re.exec(html)) !== null) sum += parseInt(m[1], 10);
              return sum;
            }

            async function commitsFromSearch() {
              const q = 'author:' + login + ' committer-date:' + year + '-01-01..' + toDay;
              const { data } = await github.rest.search.commits({ q, per_page: 1 });
              return data.total_count;
            }

            let totalContrib;
            let commitContrib;
            let footnote = '*Includes private repos · updated weekly by Actions*';

            try {
              const out = await github.graphql(
                `query($login: String!, $from: DateTime!, $to: DateTime!) {
                  user(login: $login) {
                    contributionsCollection(from: $from, to: $to) {
                      totalCommitContributions
                      contributionCalendar { totalContributions }
                    }
                  }
                }`,
                { login, from, to }
              );
              if (!out.user || !out.user.contributionsCollection) {
                throw new Error('no contributionsCollection');
              }
              const col = out.user.contributionsCollection;
              totalContrib = col.contributionCalendar.totalContributions;
              commitContrib = col.totalCommitContributions;
            } catch (e1) {
              core.warning('GraphQL full failed: ' + e1.message);
              try {
                const out = await github.graphql(
                  `query($login: String!, $from: DateTime!, $to: DateTime!) {
                    user(login: $login) {
                      contributionsCollection(from: $from, to: $to) {
                        totalCommitContributions
                      }
                    }
                  }`,
                  { login, from, to }
                );
                if (!out.user || !out.user.contributionsCollection) throw new Error('minimal GraphQL: no user');
                commitContrib = out.user.contributionsCollection.totalCommitContributions;
                totalContrib = await contributionsFromPublicPage();
                footnote = '*Commits: GraphQL · contributions: public page (GraphQL calendar failed) · weekly*';
              } catch (e2) {
                core.warning('GraphQL minimal failed: ' + e2.message);
                try {
                  totalContrib = await contributionsFromPublicPage();
                } catch (e3) {
                  core.warning('Public page: ' + e3.message);
                  totalContrib = 0;
                }
                try {
                  commitContrib = await commitsFromSearch();
                } catch (e4) {
                  core.warning('Commit search: ' + e4.message);
                  commitContrib = 0;
                }
                footnote =
                  '*Fallback: public grid + commit search (max 1000; private may be incomplete) · weekly*';
              }
            }

            const badgeUrl = (label, message, color) =>
              'https://img.shields.io/static/v1?' +
              new URLSearchParams({
                label,
                message: String(message),
                color,
                logo: 'github',
                style: 'flat-square',
              }).toString();

            const block = [
              '<!--PROFILE_STATS_START-->',
              `![GitHub contributions ${year}](${badgeUrl('contributions ' + year, totalContrib, '22c55e')})`,
              `![Commits ${year}](${badgeUrl('commits ' + year, commitContrib, '0369a1')})`,
              footnote,
              '<!--PROFILE_STATS_END-->',
            ].join('\n');

            let readme = fs.readFileSync(path, 'utf8');
            if (!readme.includes('<!--PROFILE_STATS_START-->')) {
              core.setFailed('README.md: missing <!--PROFILE_STATS_START--> markers');
              return;
            }
            readme = readme.replace(
              /<!--PROFILE_STATS_START-->[\s\S]*?<!--PROFILE_STATS_END-->/,
              block
            );
            fs.writeFileSync(path, readme);
            core.info(`login=${login} contributions=${totalContrib} commits=${commitContrib}`);

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "chore(readme): refresh maintainer GitHub stats badges"
            git push
          fi
